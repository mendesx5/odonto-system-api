server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: odonto-system

  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5432}/${DB_NAME:odontosystem}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:senha_local_segura}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration